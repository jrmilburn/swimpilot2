services:
  postgres:
    image: postgres:16-alpine
    container_name: swimpilot_test_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swimpilot_test
    ports:
      - "54329:5432"
    volumes:
      - ./scripts/db/01-create-app-role.sql:/docker-entrypoint-initdb.d/01-create-app-role.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d swimpilot_test"]
      interval: 1s
      timeout: 3s
      retries: 30
